<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #FDFBF7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 12px; border: 1px solid #C5A16F; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; outline: none; box-sizing: border-box; }
        button { background: #C5A16F; color: white; font-weight: bold; border: none; cursor: pointer; }
        #history { margin-top: 20px; width: 100%; max-width: 400px; background: white; border-radius: 10px; border: 1px solid #eee; height: 350px; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .msg { padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 0.85rem; }
        .msg b { color: #C5A16F; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h3>Acceso Maestro</h3>
        <input type="password" id="admin-key" placeholder="Introduce la clave">
        <button onclick="acceder()">Entrar</button>
    </div>

    <div id="panel-section" style="display:none; width: 100%; max-width: 400px;">
        <div class="box">
            <h3>Responder a Valentina</h3>
            <textarea id="admin-msg" placeholder="Escribe tu mensaje..."></textarea>
            <button onclick="enviar()">Enviar Mensaje</button>
            <p id="status" style="font-size: 0.7rem; text-align: center; margin-top: 5px;"></p>
        </div>
        <div id="history">Cargando chat...</div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxK54TleimC6pNwW5qugAnym4qWNhOHitSU0TPda_9pG7PN7F1d5h_QNbb3X3HteV57/exec"; 
        // Clave "87654321" en Base64
        const TOKEN = "ODc2NTQzMjE=";

        function acceder() {
            const input = document.getElementById('admin-key').value;
            if(btoa(input) === TOKEN) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('panel-section').style.display = 'block';
                cargar();
                setInterval(cargar, 3000);
            } else { alert("Clave incorrecta"); }
        }

        async function enviar() {
            const m = document.getElementById('admin-msg').value;
            if(!m.trim()) return;
            document.getElementById('status').innerText = "Enviando...";
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ remitente: "Admin", mensaje: m }) });
            document.getElementById('admin-msg').value = "";
            document.getElementById('status').innerText = "Enviado.";
            cargar();
        }

        async function cargar() {
            try {
                const res = await fetch(URL_SCRIPT);
                const datos = await res.json();
                let h = "";
                for(let i = datos.length-1; i > 0; i--) {
                    h += `<div class="msg"><b>${datos[i][0]}:</b> ${datos[i][1]}</div>`;
                }
                document.getElementById('history').innerHTML = h;
            } catch(e) {}
        }
    </script>
</body>
</html>
